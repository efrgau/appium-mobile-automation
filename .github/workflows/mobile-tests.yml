name: Mobile Automation Tests

on:
  push:
    branches: [main]

jobs:
  android-tests:
    runs-on: ubuntu-latest

    env:
      ADB_INSTALL_TIMEOUT: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Appium
        run: |
          npm install -g appium@2.19.0
          appium driver install uiautomator2@2.34.0

      # 🔥 FIX CRÍTICO → iniciar ADB ANTES del emulador
      - name: Start ADB
        run: |
          adb kill-server
          adb start-server
          adb devices

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download APK
        run: |
          mkdir -p apps
          curl -o apps/ApiDemos.apk https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk

      - name: Run Android Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          disable-animations: true
          wait-for-boot: true
          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Checking boot status..."
            boot_completed=""
            until [[ "$boot_completed" == "1" ]]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "Boot status: $boot_completed"
              sleep 5
            done

            echo "Starting Appium..."
            appium &

            sleep 15

            pytest -v