name: Mobile Automation Tests

on:
  push:
    branches: [main]

jobs:
  android-tests:
    runs-on: macos-latest  # ← único cambio estructural

    env:
      ADB_INSTALL_TIMEOUT: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Appium
        run: |
          npm install -g appium@2.19.0
          appium driver install uiautomator2@2.34.0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download APK
        run: |
          mkdir -p apps
          curl -L -o apps/ApiDemos.apk \
            https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk

      - name: Run Android Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_2
          force-avd-creation: true
          disable-animations: true
          emulator-boot-timeout: 300
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
            -no-metrics
          script: |
            echo "=== ADB devices ==="
            adb devices

            echo "=== Desactivando animaciones ==="
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0

            echo "=== Iniciando Appium ==="
            appium --log appium.log --log-level info &
            APPIUM_PID=$!

            echo "=== Esperando Appium ==="
            elapsed=0
            until curl -sf http://localhost:4723/status | grep -q '"ready":true'; do
              sleep 3
              elapsed=$((elapsed + 3))
              if [[ $elapsed -ge 60 ]]; then
                cat appium.log
                exit 1
              fi
            done
            echo "Appium listo!"

            pytest -v --tb=short

            kill $APPIUM_PID || true